name: Release

# Publishes static musl binaries on every `v*.*.*` tag push, and pins the
# per-triple sha256s into nix/release-hashes.json so the NixOS module can
# fetchurl the matching binary.
#
# Releases are immutable: once a tag's assets exist, the upload job refuses to
# overwrite them. Corrected/rebuilt binaries must ship under a new tag — the
# committed hashes are content-addressed, so mutating an asset after pinning
# would silently break every flake consumer.
#
# Hash mode: fetchurl uses `executable = true` (see flake.nix), which ingests
# the file in NAR mode with the exec bit set. The pin job therefore computes
# hashes with `nix store prefetch-file --executable`, NOT `sha256sum` (a flat
# hash that can never match). A flat-vs-NAR mismatch caused the v0.8.1/v0.8.2
# rebuild failures.
#
# Toolchain: rustc + musl targets, zig, cargo-zigbuild, cmake, and protoc all
# come from the contributor flake's `ci` dev shell (nix/dev), pinned by its
# flake.lock — the same environment ci.yml exercises on every push, including
# a cross-compile check that gates the toolchain between releases.
#
# Native-dependency survey: the release binary links ring (rustls), aws-lc-sys
# (via object_store's aws feature → reqwest rustls-tls-native-roots),
# zstd-sys/lz4-sys (foyer), all statically via the `cc` crate. aws-lc-sys
# shells out to cmake, so cmake is in the ci shell alongside zig. protoc is
# build-time only (prost). No OpenSSL is linked.

on:
  push:
    # Note: this glob also matches pre-release tags like `v0.8.0-rc1`. The repo
    # has never tagged rcs; if it ever does, the pin job would commit rc hashes
    # to master and `gh release create` below would not mark the release as a
    # prerelease. Tighten the glob (e.g. `v[0-9]*.[0-9]*.[0-9]*`) before tagging rcs.
    tags: ["v*.*.*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build static binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions: { contents: read }
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        # actions/checkout@v7, pinned by SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      # cachix/install-nix-action@v31, pinned by SHA
      - name: Install nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          extra_nix_config: "experimental-features = nix-command flakes"

      - name: Build
        run: >-
          nix develop ./nix/dev#ci --command
          cargo zigbuild --release --target ${{ matrix.target }} -p bepository-cli

      - name: Stage release asset
        run: |
          mv "target/${{ matrix.target }}/release/bepository" \
             "bepository-${{ matrix.target }}"

      - name: Upload artifact
        # actions/upload-artifact@v7, pinned by SHA
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bepository-${{ matrix.target }}
          path: bepository-${{ matrix.target }}
          if-no-files-found: error

  upload:
    name: Upload release assets + SHA256SUMS
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: write }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Download built binaries
        # actions/download-artifact@v8, pinned by SHA
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: assets
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd assets
          sha256sum bepository-x86_64-unknown-linux-musl \
                    bepository-aarch64-unknown-linux-musl > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            # Releases are immutable (see top of file): an existing release for
            # this tag means a prior upload already published these assets.
            # Overwriting them would desync nix/release-hashes.json, whose
            # committed sha256s are content-addressed. Fail loudly instead — a
            # corrected binary must ship under a new tag.
            EXISTING=$(gh release view "$TAG" --json assets -q '.assets[].name')
            if [ -n "$EXISTING" ]; then
              echo "::error::Release '$TAG' already has assets:" $EXISTING
              echo "Releases are immutable. Move the tag or cut a new release; do not clobber."
              exit 1
            fi
            # Empty release shell exists (no assets): populate it.
            gh release upload "$TAG" \
              assets/bepository-x86_64-unknown-linux-musl \
              assets/bepository-aarch64-unknown-linux-musl \
              assets/SHA256SUMS
          else
            gh release create "$TAG" --verify-tag --generate-notes \
              assets/bepository-x86_64-unknown-linux-musl \
              assets/bepository-aarch64-unknown-linux-musl \
              assets/SHA256SUMS
          fi

  pin-nix-hashes:
    name: Pin nix/release-hashes.json
    needs: upload
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: write, pull-requests: write }
    steps:
      - name: Checkout master
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: master

      - name: Install nix
        # Needed so the hashes we pin match what nix's fetchurl will later
        # compute. fetchurl with `executable = true` (see flake.nix) uses a
        # NAR-mode hash — i.e. the recursive hash over the file with the exec
        # bit set. `sha256sum` produces a flat hash, which can never match, so
        # we must derive the hash the same way nix ingests the file.
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          extra_nix_config: "experimental-features = nix-command flakes"

      - name: Rewrite release-hashes.json from the release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Compute the SAME hash nix's fetchurl will later verify against:
          # `nix store prefetch-file --executable` ingests the file in NAR mode
          # with the executable bit set, exactly mirroring
          # `pkgs.fetchurl { executable = true; }` in flake.nix. The resulting
          # SRI string (sha256-…=, base64) is what fetchurl's `sha256` field
          # accepts. A plain sha256sum (flat hash) would never match.
          X86=$(nix store prefetch-file --executable --json \
                  "https://github.com/${{ github.repository }}/releases/download/${TAG}/bepository-x86_64-unknown-linux-musl" \
                | jq -r .hash)
          ARM=$(nix store prefetch-file --executable --json \
                  "https://github.com/${{ github.repository }}/releases/download/${TAG}/bepository-aarch64-unknown-linux-musl" \
                | jq -r .hash)
          test -n "$X86" -a -n "$ARM"
          # jq rejects hyphens in unquoted object keys — quote them. The key
          # names must match flake.nix's hashes.${system} reads exactly.
          jq --null-input \
            --arg version "$VERSION" \
            --arg x86 "$X86" \
            --arg arm "$ARM" \
            '{version: $version, comment: "filled by release CI on tag push", "x86_64-linux": $x86, "aarch64-linux": $arm}' \
            > nix/release-hashes.json
          cat nix/release-hashes.json

      - name: Verify the pinned hashes build
        run: |
          # End-to-end check: the hash we just pinned must actually fetchurl.
          # `nix build` exercises the exact flake.nix fetchurl path consumers
          # use, so a flat/NAR mode mismatch or a stale asset fails here before
          # we commit — rather than on every downstream nixos-rebuild. Only the
          # runner's native arch is built (x86_64 on ubuntu-latest); the aarch64
          # hash comes from the same deterministic prefetch above.
          nix build --no-link .#packages.${{ runner.arch == 'X64' && 'x86_64' || 'aarch64' }}-linux.default

      - name: Commit hash pin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nix/release-hashes.json
          git commit -m "chore(nix): pin ${{ github.ref_name }} release binaries" || exit 0
          if git push origin master; then
            echo "Pushed hash pin to master."
            exit 0
          fi
          echo "::warning::Push rejected (branch protection). Opening a PR."
          BRANCH="pin-release-hashes-$(date +%s)"
          git switch -c "$BRANCH"
          git push origin "$BRANCH"
          # Note: PRs created with GITHUB_TOKEN do not trigger pull_request CI;
          # required status checks will need a manual close/reopen or push.
          if ! gh pr create \
                 --title "chore(nix): pin ${{ github.ref_name }} release binaries" \
                 --body "Bot commit from the release workflow (push to master was rejected by branch protection)." \
                 --head "$BRANCH" --base master; then
            echo "::error::Could not open the PR automatically — likely 'Allow GitHub Actions to create and approve pull requests' is disabled (Settings → Actions → General). The pin commit is on branch '$BRANCH'; open it manually: https://github.com/${{ github.repository }}/compare/master...$BRANCH"
            exit 1
          fi
