name: Release OCI Image

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push OCI image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: "experimental-features = nix-command flakes"

      - name: Build OCI image
        run: nix build ./nix/dev#oci --out-link result-oci

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI image
        run: |
          docker load < result-oci
          IMAGE="ghcr.io/${{ github.repository }}"
          docker tag bepository:latest "${IMAGE}:latest"
          docker tag bepository:latest "${IMAGE}:${{ github.ref_name }}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.ref_name }}"
