name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: nix flake check + e2e + packager
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # actions/checkout@v7, pinned by SHA
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      # nixbuild/nix-quick-install-action@v35, pinned by SHA. Paired with
      # cache-nix-action below, which expects this installer's store layout.
      - uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c
        with:
          nix_conf: |
            experimental-features = nix-command flakes

      # nix-community/cache-nix-action@v7, pinned by SHA. Caches crane's
      # cargoArtifacts (the expensive part of `nix flake check ./nix/dev`) in
      # GitHub's native Actions cache — no external account, no secret. Keyed
      # on both lockfiles so a hit means the build is reproducible; the prefix
      # restore-key reuses the last-known store when only one lockfile moved.
      - name: Restore nix store cache
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'nix/dev/flake.lock', 'Cargo.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-
      # Smoke-check the user-facing flake (module + release-binary fetch, fast to eval).
      - run: nix flake check
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Run cargo tests, fmt, and clippy via the contributor flake.
      - run: nix flake check ./nix/dev
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Distro packager tier: the CLI must build with --no-default-features
      # (no self-manage networking/service code).
      - run: nix develop ./nix/dev#ci --command just check-packager
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: nix develop ./nix/dev#ci --command just test-e2e
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Cross-compile check: a `nix flake update` or dependency change that
      # breaks musl cross-compilation fails here on push, not on tag day.
      # Debug build, one target — cheaper than the release matrix.
      - run: nix develop ./nix/dev#ci --command cargo zigbuild --target x86_64-unknown-linux-musl -p bepository-cli
