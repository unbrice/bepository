# bepository compose file
#
# Usage:
#   1. Copy this file and env.example to your deployment directory.
#   2. cp env.example .env && $EDITOR .env
#   3. One-time setup:
#        podman compose run --rm init
#        podman compose run --rm get-id     # add this ID to your Syncthing peer
#   4. Start the daemon:
#        podman compose up -d
#
# Works equally with 'docker compose'.
#
# Storage URI quick reference (put non-secret config in the URI):
#   Local volume:  file:///data
#   Amazon S3:     s3://bucket/prefix?region=us-east-1
#   S3-compatible: s3://bucket/prefix?region=auto&endpoint=https://minio.example.com
#   Google GCS:    gs://bucket/prefix?project=my-gcp-project

x-base: &base
  image: ghcr.io/unbrice/bepository:latest
  env_file: .env
  # Pin the cache directory to the mounted volume regardless of what .env says.
  environment:
    BEPOSITORY_CACHE_DIRECTORY: /var/cache/bepository
  volumes:
    - data:/data
    - cache:/var/cache/bepository
    # For GCS: drop sa-key.json next to this compose file and uncomment, then
    # set GOOGLE_APPLICATION_CREDENTIALS=/etc/bepository/sa-key.json in .env.
    # - ./sa-key.json:/etc/bepository/sa-key.json:ro

services:
  # --- Daemon (always running) ---
  bepository:
    <<: *base
    restart: unless-stopped
    ports:
      - "${BEPOSITORY_PORT:-22001}:22001"
    read_only: true
    tmpfs:
      - /tmp
    command: serve --listen 0.0.0.0:22001

  # --- Setup helpers (run with: podman compose run --rm <service>) ---

  init:
    <<: *base
    command: init
    profiles: [setup]

  get-id:
    <<: *base
    command: get-id
    profiles: [setup]

volumes:
  data:
  cache:
