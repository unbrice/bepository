# bepository compose file
#
# Usage:
#   1. Copy this file and env.example to your deployment directory.
#   2. cp env.example .env && $EDITOR .env
#   3. One-time setup:
#        podman compose run --rm init
#        podman compose run --rm get-id     # add this ID to your Syncthing peer
#   4. Start the daemon:
#        podman compose up -d
#
# Works equally with 'docker compose'.
#
# Storage URI quick reference (put non-secret config in the URI):
#   Local volume:  file:///data
#   Amazon S3:     s3://bucket/prefix?region=us-east-1
#   S3-compatible: s3://bucket/prefix?region=auto&endpoint=https://minio.example.com
#   Google GCS:    gs://bucket/prefix?project=my-gcp-project

# Credentials only — non-secret config (region, project, endpoint) goes in STORAGE_URI.
x-credentials: &credentials # AWS
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  # GCS
  GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-}

services:
  # --- Daemon (always running) ---
  bepository:
    image: ghcr.io/unbrice/bepository:latest
    restart: unless-stopped
    ports:
      - "${LISTEN_PORT:-22001}:22001"
    volumes:
      - data:/data
      - cache:/var/cache/bepository
    read_only: true
    tmpfs:
      - /tmp
    environment:
      <<: *credentials
      CACHE_DIRECTORY: ${CACHE_DIRECTORY:-/var/cache/bepository}
    command: >
      serve
      ${STORAGE_URI}
      ${MASTER_DEVICE_ID}
      --listen 0.0.0.0:22001
      --priority ${PRIORITY:-100}
      --lease ${LEASE:-180}

  # --- Setup helpers (run with: podman compose run --rm <service>) ---

  init:
    image: ghcr.io/unbrice/bepository:latest
    volumes:
      - data:/data
      - cache:/var/cache/bepository
    environment:
      <<: *credentials
      CACHE_DIRECTORY: ${CACHE_DIRECTORY:-/var/cache/bepository}
    command: init ${STORAGE_URI}
    profiles: [setup]

  get-id:
    image: ghcr.io/unbrice/bepository:latest
    volumes:
      - data:/data
      - cache:/var/cache/bepository
    environment:
      <<: *credentials
    command: get-id ${STORAGE_URI}
    profiles: [setup]

volumes:
  data:
  cache:
