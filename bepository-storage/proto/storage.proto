syntax = "proto3";

// buf:lint:ignore PACKAGE_VERSION_SUFFIX
// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package storage;

// Points to the directory where canonical block data lives (cross-dir dedup).
message BlockRef {
  string source_dir = 1;
}

// Our folder index metadata, stored at key "ix".
message FolderIndexMeta {
  int64 max_sequence = 2; // highest assigned sequence in this folder
}

// Remote device index tracking, stored at key "dx/<devid_32>".
message RemoteIndexState {
  uint64 index_id = 1;
  int64 max_sequence = 2;
}

// Duplicated from bep.proto so that storage.proto has no external imports.
// Conversion between bep::FileInfo and storage::FileInfo is in src/proto.rs.

message FileInfo {
  string name = 1;
  int64 size = 3;
  int64 modified_s = 5;
  uint64 modified_by = 12;
  Vector version = 9;
  int64 sequence = 10;
  repeated BlockInfo blocks = 16;
  bytes symlink_target = 17;
  bytes blocks_hash = 18;
  bytes previous_blocks_hash = 20;
  bytes encrypted = 19;
  FileInfoType type = 2;
  uint32 permissions = 4;
  int32 modified_ns = 11;
  int32 block_size = 13;
  PlatformData platform = 14;

  uint32 local_flags = 1000;
  bytes version_hash = 1001;
  int64 inode_change_ns = 1002;
  int32 encryption_trailer_size = 1003;

  bool deleted = 6;
  bool invalid = 7;
  bool no_permissions = 8;
}

enum FileInfoType {
  FILE_INFO_TYPE_UNSPECIFIED = 0;
  FILE_INFO_TYPE_FILE = 1;
  FILE_INFO_TYPE_DIRECTORY = 2;
  FILE_INFO_TYPE_SYMLINK = 3;
}

message BlockInfo {
  bytes hash = 3;
  int64 offset = 1;
  int32 size = 2;
  reserved 4;
}

message Vector {
  repeated Counter counters = 1;
}

message Counter {
  uint64 id = 1;
  uint64 value = 2;
}

message PlatformData {
  UnixData unix = 1;
  WindowsData windows = 2;
  XattrData linux = 3;
  XattrData darwin = 4;
  XattrData freebsd = 5;
  XattrData netbsd = 6;
}

message UnixData {
  string owner_name = 1;
  string group_name = 2;
  int32 uid = 3;
  int32 gid = 4;
}

message WindowsData {
  string owner_name = 1;
  bool owner_is_group = 2;
}

message XattrData {
  repeated Xattr xattrs = 1;
}

message Xattr {
  string name = 1;
  bytes value = 2;
}

// Committed file entry, stored at n/<name>.
message File {
  FileInfo file_info = 1;
}

// Inbox entry for in-progress block transfers, stored at in/<epoch>/<name>.
message Inbox {
  FileInfo file_info = 1;
}
